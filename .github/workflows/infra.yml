name: Terraform Infrastructure

# Plans on every PR that touches terraform/, applies only on merge to
# main. This keeps infra changes reviewable (the plan output shows up
# as a PR comment-style log) before anything is actually created.
on:
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to mint the OIDC token for AWS
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform
  TF_VAR_single_nat_gateway: ${{ vars.TF_VAR_single_nat_gateway }}
  TF_VAR_alert_email: ${{ vars.TF_VAR_alert_email }}

jobs:
  plan:
    name: Terraform fmt / validate / plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC - no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false
        # Tip: pipe this to a sticky PR comment with an action like
        # actions/github-script if you want reviewers to see the plan
        # without opening the Actions log.

  apply:
    name: Terraform apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Requires a "production" GitHub Environment with required
    # reviewers configured, so a human approves before apply runs.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC - no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false
