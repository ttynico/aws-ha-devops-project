name: App CI

# Lints and tests the Flask app on every PR/push that touches app/.
# This must pass before the app-deploy workflow ever runs.
on:
  pull_request:
    paths: ["app/**"]
  push:
    branches: [main]
    paths: ["app/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Lint
        working-directory: app
        run: flake8 app.py --max-line-length=100

      - name: Run tests
        working-directory: app
        run: pytest -v
